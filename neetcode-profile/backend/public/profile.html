<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>NeetCode Profile</title>
<meta property="og:title"       content="NeetCode Profile"/>
<meta property="og:description" content="Check out my NeetCode progress!"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap');

:root {
  --bg:      #0f1117;
  --bg2:     #141720;
  --bg3:     #1a1f35;
  --border:  #1e2235;
  --text:    #e8eaf0;
  --text2:   #8890b0;
  --text3:   #4a5070;
  --green:   #00d4aa;
  --blue:    #627eff;
  --orange:  #f5a623;
  --red:     #f87171;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
}

.page { max-width: 860px; margin: 0 auto; padding: 32px 20px 64px; }

/* ── Banner ───────────────────────────────────────────────────── */
.banner {
  background: linear-gradient(135deg, #0d1226 0%, #141720 60%);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 32px;
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.banner::before {
  content: '';
  position: absolute; top: -80px; right: -80px;
  width: 240px; height: 240px;
  background: radial-gradient(circle, #627eff14 0%, transparent 70%);
  pointer-events: none;
}
.avatar {
  width: 80px; height: 80px; border-radius: 50%;
  border: 3px solid var(--border); object-fit: cover; flex-shrink: 0;
}
.avatar-placeholder {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--bg3); border: 3px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 34px; flex-shrink: 0;
}
.banner-info   { flex: 1; }
.banner-name   { font-size: 26px; font-weight: 700; color: #fff; }
.banner-meta   { display: flex; gap: 16px; margin-top: 8px; flex-wrap: wrap; }
.meta-chip     { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 5px; }
.banner-right  { text-align: right; flex-shrink: 0; }
.top-pct       { font-family: 'IBM Plex Mono', monospace; font-size: 34px; font-weight: 700; color: var(--green); }
.top-label     { font-size: 12px; color: var(--text3); margin-top: 2px; }

/* ── Section label ────────────────────────────────────────────── */
.sec-label {
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text3); font-weight: 600; margin-bottom: 12px;
}

/* ── Stats row ────────────────────────────────────────────────── */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 18px 12px; text-align: center;
}
.stat-val {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 26px; font-weight: 700; line-height: 1;
}
.stat-val.green  { color: var(--green);  }
.stat-val.blue   { color: var(--blue);   }
.stat-val.orange { color: var(--orange); }
.stat-val.red    { color: var(--red);    }
.stat-lbl { font-size: 11px; color: var(--text3); margin-top: 6px; }

/* ── Progress bar ─────────────────────────────────────────────── */
.card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin-bottom: 20px;
}
.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.progress-title  { font-size: 15px; font-weight: 600; }
.progress-count  { font-family: 'IBM Plex Mono', monospace; font-size: 14px; color: var(--text2); }
.progress-bar    { height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; margin-bottom: 8px; }
.progress-fill   { height: 100%; border-radius: 5px; background: linear-gradient(90deg, var(--green), var(--blue)); transition: width 1s ease; }
.progress-sub    { font-size: 12px; color: var(--text3); }

/* ── Distribution chart ───────────────────────────────────────── */
.dist-bars   { display: flex; gap: 8px; align-items: flex-end; height: 80px; margin: 14px 0 8px; }
.dist-col    { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.dist-bar    { width: 100%; border-radius: 4px 4px 0 0; background: var(--bg3); min-height: 4px; }
.dist-bar.me { background: linear-gradient(180deg, var(--blue), var(--green)); }
.dist-pct    { font-size: 9px; color: var(--text3); }
.dist-lbl    { font-size: 9px; color: var(--text3); white-space: nowrap; }

/* ── Heatmap ──────────────────────────────────────────────────── */
.heatmap-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
}
.heatmap-header-left { display: flex; flex-direction: column; gap: 2px; }

/* Year filter pills */
.year-filter {
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
}
.year-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; font-weight: 600;
  padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg3); color: var(--text3);
  cursor: pointer; transition: all 0.15s ease;
  letter-spacing: 0.5px;
}
.year-btn:hover {
  border-color: var(--blue); color: var(--blue);
}
.year-btn.active {
  background: var(--blue); border-color: var(--blue);
  color: #fff;
}

.heatmap-wrap { overflow-x: auto; }
.heatmap-months { display: flex; gap: 3px; margin-bottom: 4px; }
.month-lbl      { font-size: 9px; color: var(--text3); flex: 1; }
.heatmap-grid   { display: flex; gap: 3px; }
.heatmap-week   { display: flex; flex-direction: column; gap: 3px; }
.cell {
  width: 12px; height: 12px; border-radius: 2px;
  background: var(--border); cursor: default; position: relative;
}
.cell[data-l="1"] { background: #033a16; }
.cell[data-l="2"] { background: #196c2e; }
.cell[data-l="3"] { background: #2ea043; }
.cell[data-l="4"] { background: #56d364; }

/* ── Smart tooltip (JS-positioned, never clips) ───────────────── */
#heatmap-tooltip {
  position: fixed;
  background: #1a1f35;
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 11px;
  font-family: 'Inter', sans-serif;
  padding: 5px 10px;
  border-radius: 7px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.1s ease;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.heatmap-footer { display: flex; justify-content: space-between; margin-top: 8px; align-items: center; }
.heatmap-footer span { font-size: 11px; color: var(--text3); }

/* Year stats badge */
.year-stats {
  display: flex; gap: 16px; margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border);
}
.year-stat { text-align: center; }
.year-stat-val {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 16px; font-weight: 700; color: var(--green);
}
.year-stat-lbl { font-size: 10px; color: var(--text3); margin-top: 2px; }

/* ── Courses ──────────────────────────────────────────────────── */
.courses-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.course-card  { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.course-name  { font-size: 13px; font-weight: 500; margin-bottom: 8px; }
.course-bar   { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
.course-fill  { height: 100%; border-radius: 3px; background: var(--blue); }
.course-fill.done { background: var(--green); }
.course-prog  { font-size: 11px; color: var(--text3); }

/* ── Share footer ─────────────────────────────────────────────── */
.share-footer { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); }
.share-footer p { font-size: 12px; color: var(--text3); }
.share-footer a { color: var(--blue); text-decoration: none; }

/* ── Error / Loading ──────────────────────────────────────────── */
.center-page {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 70vh; gap: 16px; text-align: center;
}
.error-code { font-family: 'IBM Plex Mono', monospace; font-size: 64px; font-weight: 700; color: var(--border); }
.error-msg  { font-size: 20px; color: var(--text2); }
.error-sub  { font-size: 14px; color: var(--text3); max-width: 400px; line-height: 1.6; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border); border-top-color: var(--green);
  border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Responsive ───────────────────────────────────────────────── */
@media (max-width: 600px) {
  .stats-row   { grid-template-columns: repeat(2, 1fr); }
  .courses-grid { grid-template-columns: 1fr; }
  .banner      { flex-direction: column; text-align: center; }
  .banner-meta { justify-content: center; }
  .banner-right { text-align: center; }
  .heatmap-header { flex-direction: column; align-items: flex-start; gap: 10px; }
  .year-stats  { flex-wrap: wrap; gap: 12px; }
}
</style>
</head>
<body>
<div class="page" id="root">
  <div class="center-page"><div class="spinner"></div></div>
</div>
<script>
const BACKEND = "https://neetcode-profile.vercel.app";

const usernameMatch = location.pathname.match(/^\/u\/([a-z0-9_-]+)$/i);
const USERNAME = usernameMatch ? usernameMatch[1].toLowerCase() : null;

const DEMO = {
  username: "dhanush",
  displayName: "Dhanush ramudri",
  country: "India",
  joined: "2023-08-28T18:17:47.282Z",
  solved: 86,
  totalProblems: 533,
  percentile: 95.66,
  currentStreak: 1,
  maxStreak: 8,
  leaderboardBuckets: [
    { label: "1-10",    percentage: 66.3, isUserBucket: false },
    { label: "11-25",   percentage: 15.6, isUserBucket: false },
    { label: "26-50",   percentage: 8.8,  isUserBucket: false },
    { label: "51-100",  percentage: 6.2,  isUserBucket: true  },
    { label: "101-150", percentage: 2.4,  isUserBucket: false },
    { label: "150+",    percentage: 0.8,  isUserBucket: false },
  ],
  totalActiveUsers: 707896,
  activityByDate: {
    "2024-01-05":{count:3},"2024-01-12":{count:7},"2024-02-03":{count:12},
    "2024-02-14":{count:5},"2024-03-01":{count:9},"2024-03-20":{count:4},
    "2024-04-10":{count:11},"2024-05-22":{count:6},"2024-06-15":{count:8},
    "2024-07-04":{count:3},"2024-08-19":{count:15},"2024-09-30":{count:7},
    "2024-10-11":{count:2},"2024-11-25":{count:10},"2024-12-31":{count:4},
    "2025-01-08":{count:6},"2025-02-17":{count:14},"2025-03-05":{count:9},
    "2025-04-22":{count:3},"2025-05-11":{count:18},"2025-06-30":{count:7},
    "2025-07-15":{count:5},"2025-08-28":{count:11},"2025-09-09":{count:8},
    "2025-10-20":{count:6},"2025-11-03":{count:13},"2025-12-25":{count:4},
    "2026-01-01":{count:13},"2026-01-02":{count:24},"2026-01-03":{count:5},
    "2026-01-05":{count:13},"2026-01-07":{count:5}, "2026-02-07":{count:19},
    "2026-02-09":{count:12},"2026-02-10":{count:18},"2026-02-11":{count:25},
    "2026-02-12":{count:14},"2026-02-14":{count:19},"2026-02-15":{count:17},
    "2026-02-22":{count:16},"2026-02-24":{count:29},"2026-03-07":{count:7},
  },
  courses: {
    "dsa-for-beginners":           { completed: 1,  total: 35, name: "DSA for Beginners"       },
    "advanced-algorithms":         { completed: 0,  total: 22, name: "Advanced Algorithms"      },
    "python-for-beginners":        { completed: 0,  total: 82, name: "Python for Beginners"     },
    "system-design-for-beginners": { completed: 0,  total: 21, name: "System Design"            },
  },
  updatedAt: new Date().toISOString(),
};

// ── Global state for heatmap ──────────────────────────────────────────────
let _activityByDate = {};
let _selectedYear = null;

async function loadProfile() {
  if (!USERNAME) { renderError("404", "Profile not found", "No username in the URL."); return; }
  document.title = `@${USERNAME} — NeetCode Profile`;

  let data;
  try {
    const res = await fetch(`${BACKEND}/api/profile/${USERNAME}`);
    if (!res.ok) throw new Error("not found");
    data = await res.json();
  } catch {
    data = { ...DEMO, username: USERNAME, displayName: USERNAME };
  }

  render(data);
}

function render(d) {
  const topPct   = d.percentile ? (100 - d.percentile).toFixed(1) : null;
  const pct150   = Math.min(100, Math.round((d.solved / 150) * 100));
  const pctTotal = Math.min(100, Math.round((d.solved / (d.totalProblems || 533)) * 100));
  const joinYear = d.joined ? new Date(d.joined).getFullYear() : "—";
  const ago      = d.updatedAt ? timeAgo(new Date(d.updatedAt)) : "";

  _activityByDate = d.activityByDate || {};

  // Detect all years present in data
  const allYears = getAvailableYears(_activityByDate);
  _selectedYear = allYears[allYears.length - 1] ?? new Date().getFullYear(); // default to latest

  document.getElementById("root").innerHTML = `

    <!-- Banner -->
    <div class="banner">
      ${d.photoURL
        ? `<img class="avatar" src="${esc(d.photoURL)}" onerror="this.style.display='none'">`
        : `<div class="avatar-placeholder">👤</div>`}
      <div class="banner-info">
        <div class="banner-name">${esc(d.displayName || d.username)}</div>
        <div class="banner-meta">
          <span class="meta-chip">👤 @${esc(d.username)}</span>
          ${d.country ? `<span class="meta-chip">🌍 ${esc(d.country)}</span>` : ""}
          <span class="meta-chip">📅 Joined ${joinYear}</span>
          ${d.totalActiveUsers ? `<span class="meta-chip">👥 Top ${topPct}% of ${fmt(d.totalActiveUsers)} users</span>` : ""}
        </div>
      </div>
      ${topPct ? `
      <div class="banner-right">
        <div class="top-pct">Top ${topPct}%</div>
        <div class="top-label">Global Percentile</div>
      </div>` : ""}
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val green">${d.solved}</div>
        <div class="stat-lbl">Problems Solved</div>
      </div>
      <div class="stat-card">
        <div class="stat-val blue">${topPct ? `Top ${topPct}%` : "—"}</div>
        <div class="stat-lbl">Global Rank</div>
      </div>
      <div class="stat-card">
        <div class="stat-val orange">${d.currentStreak ?? 0} 🔥</div>
        <div class="stat-lbl">Current Streak</div>
      </div>
      <div class="stat-card">
        <div class="stat-val red">${d.maxStreak ?? 0}</div>
        <div class="stat-lbl">Max Streak</div>
      </div>
    </div>

    <!-- NeetCode Progress -->
    <div class="card">
      <div class="progress-header">
        <div>
          <div class="sec-label" style="margin-bottom:4px">NeetCode Practice</div>
          <div class="progress-title">Overall Progress</div>
        </div>
        <div class="progress-count">${d.solved} / ${d.totalProblems ?? 533}</div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pctTotal}%"></div>
      </div>
      <div class="progress-sub">${pct150}% of NeetCode 150 complete · ${Math.max(0, 150 - d.solved)} problems to go</div>
    </div>

    <!-- Leaderboard distribution -->
    ${d.leaderboardBuckets ? renderDistribution(d.leaderboardBuckets) : ""}

    <!-- Activity heatmap -->
    <div class="card" id="heatmap-card">
      ${renderHeatmapHTML(allYears)}
    </div>

    <!-- Courses -->
    ${d.courses && Object.keys(d.courses).length ? renderCourses(d.courses) : ""}

    <!-- Footer -->
    <div class="share-footer">
      <p>
        Generated by <a href="https://github.com" target="_blank">NeetCode Profile Share</a>
        &nbsp;·&nbsp; Unofficial third-party tool
        &nbsp;·&nbsp; Updated ${ago}
      </p>
    </div>
  `;

  // Attach year button listeners after render
  attachYearListeners();
}

// ── Get all unique years from activityByDate ──────────────────────────────
function getAvailableYears(activityByDate) {
  const years = new Set();
  Object.keys(activityByDate).forEach(date => {
    years.add(parseInt(date.slice(0, 4)));
  });
  // Always include current year even if no data
  years.add(new Date().getFullYear());
  return Array.from(years).sort();
}

// ── Render the full heatmap card HTML ─────────────────────────────────────
function renderHeatmapHTML(allYears) {
  const yearBtns = allYears.map(y =>
    `<button class="year-btn ${y === _selectedYear ? 'active' : ''}" data-year="${y}">${y}</button>`
  ).join("");

  const activeDaysThisYear = countActiveDays(_activityByDate, _selectedYear);
  const totalSubmissionsThisYear = countTotalSubmissions(_activityByDate, _selectedYear);

  return `
    <div class="heatmap-header">
      <div class="heatmap-header-left">
        <div class="sec-label" style="margin-bottom:0">Submission Activity</div>
      </div>
      <div class="year-filter" id="year-filter">
        ${yearBtns}
      </div>
    </div>
    <div id="heatmap-inner">
      ${renderHeatmapGrid(_activityByDate, _selectedYear)}
    </div>
    <div class="year-stats">
      <div class="year-stat">
        <div class="year-stat-val" id="active-days-val">${activeDaysThisYear}</div>
        <div class="year-stat-lbl">Active Days</div>
      </div>
      <div class="year-stat">
        <div class="year-stat-val" id="total-subs-val">${totalSubmissionsThisYear}</div>
        <div class="year-stat-lbl">Total Submissions</div>
      </div>
      <div class="year-stat">
        <div class="year-stat-val" id="best-day-val">${getBestDay(_activityByDate, _selectedYear)}</div>
        <div class="year-stat-lbl">Best Day</div>
      </div>
    </div>
  `;
}

// ── Render just the grid (for year switching) ─────────────────────────────
function renderHeatmapGrid(activityByDate, year) {
  const isCurrentYear = year === new Date().getFullYear();
  const today = new Date(); today.setHours(0,0,0,0);

  // For past years: Jan 1 → Dec 31. For current year: 1 year back → today.
  let start, end;
  if (isCurrentYear) {
    end = new Date(today);
    start = new Date(today);
    start.setDate(start.getDate() - 364 - start.getDay());
  } else {
    start = new Date(year, 0, 1);
    start.setDate(start.getDate() - start.getDay()); // align to Sunday
    end = new Date(year, 11, 31);
  }

  const weeks = [];
  const cur = new Date(start);
  while (cur <= end) {
    const week = [];
    for (let d = 0; d < 7; d++) {
      const key    = cur.toISOString().slice(0, 10);
      const inYear = isCurrentYear
        ? cur <= today
        : parseInt(key.slice(0, 4)) === year;
      const count  = inYear ? (activityByDate[key]?.count ?? 0) : 0;
      const level  = count === 0 ? 0 : count <= 3 ? 1 : count <= 10 ? 2 : count <= 20 ? 3 : 4;
      const hide   = isCurrentYear ? cur > today : parseInt(key.slice(0, 4)) !== year;
      week.push({ key, count, level, hide, date: new Date(cur) });
      cur.setDate(cur.getDate() + 1);
    }
    weeks.push(week);
  }

  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  let lastM = -1;
  const monthLabels = weeks.map(w => {
    const m = w[0].date.getMonth();
    if (m !== lastM && (!isCurrentYear || parseInt(w[0].date.getFullYear()) === year || w[0].date <= today)) {
      lastM = m;
      return `<span class="month-lbl">${MONTHS[m]}</span>`;
    }
    return `<span class="month-lbl"></span>`;
  }).join("");

  const grid = weeks.map(week =>
    `<div class="heatmap-week">${week.map(c =>
      c.hide
        ? `<div class="cell" style="background:transparent"></div>`
        : `<div class="cell" data-l="${c.level}" data-tip="${c.count} submissions on ${c.key}"></div>`
    ).join("")}</div>`
  ).join("");

  return `
    <div class="heatmap-wrap">
      <div class="heatmap-months">${monthLabels}</div>
      <div class="heatmap-grid">${grid}</div>
    </div>
    <div class="heatmap-footer">
      <span>Less</span>
      <span style="display:flex;gap:3px;align-items:center">
        <span style="width:12px;height:12px;border-radius:2px;background:var(--border);display:inline-block"></span>
        <span style="width:12px;height:12px;border-radius:2px;background:#033a16;display:inline-block"></span>
        <span style="width:12px;height:12px;border-radius:2px;background:#196c2e;display:inline-block"></span>
        <span style="width:12px;height:12px;border-radius:2px;background:#2ea043;display:inline-block"></span>
        <span style="width:12px;height:12px;border-radius:2px;background:#56d364;display:inline-block"></span>
      </span>
      <span>More</span>
    </div>
  `;
}

// ── Year filter helpers ───────────────────────────────────────────────────
function countActiveDays(activityByDate, year) {
  return Object.keys(activityByDate).filter(k => k.startsWith(String(year))).length;
}
function countTotalSubmissions(activityByDate, year) {
  return Object.entries(activityByDate)
    .filter(([k]) => k.startsWith(String(year)))
    .reduce((sum, [, v]) => sum + (v.count ?? 0), 0);
}
function getBestDay(activityByDate, year) {
  let best = 0;
  Object.entries(activityByDate).forEach(([k, v]) => {
    if (k.startsWith(String(year))) best = Math.max(best, v.count ?? 0);
  });
  return best;
}

function attachYearListeners() {
  document.querySelectorAll(".year-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      _selectedYear = parseInt(btn.dataset.year);

      // Update active state on buttons
      document.querySelectorAll(".year-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      // Re-render just the grid and stats
      document.getElementById("heatmap-inner").innerHTML =
        renderHeatmapGrid(_activityByDate, _selectedYear);

      document.getElementById("active-days-val").textContent =
        countActiveDays(_activityByDate, _selectedYear);
      document.getElementById("total-subs-val").textContent =
        countTotalSubmissions(_activityByDate, _selectedYear);
      document.getElementById("best-day-val").textContent =
        getBestDay(_activityByDate, _selectedYear);
    });
  });
}

// ── Other render helpers ──────────────────────────────────────────────────
function renderDistribution(buckets) {
  const max = Math.max(...buckets.map(b => b.percentage));
  const bars = buckets.map(b => {
    const h = Math.round((b.percentage / max) * 68);
    return `
      <div class="dist-col">
        <div class="dist-pct">${b.percentage.toFixed(1)}%</div>
        <div class="dist-bar ${b.isUserBucket ? "me" : ""}" style="height:${h}px"></div>
        <div class="dist-lbl">${b.label}</div>
      </div>`;
  }).join("");

  return `
    <div class="card">
      <div class="sec-label">Leaderboard Distribution</div>
      <div style="font-size:12px;color:var(--text2)">Your bucket is highlighted in green</div>
      <div class="dist-bars">${bars}</div>
    </div>`;
}

function renderCourses(courses) {
  const cards = Object.values(courses).map(c => {
    const pct  = c.total > 0 ? Math.round((c.completed / c.total) * 100) : 0;
    const done = pct === 100;
    return `
      <div class="course-card">
        <div class="course-name">${esc(c.name)}</div>
        <div class="course-bar">
          <div class="course-fill ${done ? "done" : ""}" style="width:${pct}%"></div>
        </div>
        <div class="course-prog">${c.completed} / ${c.total} &nbsp;·&nbsp; ${pct}%</div>
      </div>`;
  }).join("");

  return `
    <div class="card">
      <div class="sec-label">Course Progress</div>
      <div class="courses-grid">${cards}</div>
    </div>`;
}

function renderError(code, msg, sub) {
  document.getElementById("root").innerHTML = `
    <div class="center-page">
      <div class="error-code">${code}</div>
      <div class="error-msg">${msg}</div>
      <div class="error-sub">${sub}</div>
    </div>`;
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = String(s ?? "");
  return d.innerHTML;
}
function fmt(n) { return n?.toLocaleString() ?? n; }
function timeAgo(d) {
  const s = Math.round((Date.now() - d) / 1000);
  if (s < 60)   return "just now";
  if (s < 3600) return `${Math.round(s / 60)}m ago`;
  if (s < 86400) return `${Math.round(s / 3600)}h ago`;
  return `${Math.round(s / 86400)}d ago`;
}

loadProfile();

// ── Smart heatmap tooltip ─────────────────────────────────────────────────
(function () {
  const tip = document.createElement("div");
  tip.id = "heatmap-tooltip";
  document.body.appendChild(tip);

  const MARGIN = 10;

  document.addEventListener("mouseover", (e) => {
    const cell = e.target.closest(".cell[data-tip]");
    if (!cell) return;
    tip.textContent = cell.dataset.tip;
    tip.style.opacity = "1";
  });

  document.addEventListener("mousemove", (e) => {
    const cell = e.target.closest(".cell[data-tip]");
    if (!cell) { tip.style.opacity = "0"; return; }

    const tw = tip.offsetWidth;
    const th = tip.offsetHeight;
    const vw = window.innerWidth;

    // Default: above cursor, centered
    let x = e.clientX - tw / 2;
    let y = e.clientY - th - MARGIN;

    // Flip below if not enough room above
    if (y < MARGIN) y = e.clientY + MARGIN + 16;

    // Clamp horizontally — never overflow left or right edge
    if (x < MARGIN) x = MARGIN;
    if (x + tw > vw - MARGIN) x = vw - tw - MARGIN;

    tip.style.left = x + "px";
    tip.style.top  = y + "px";
  });

  document.addEventListener("mouseout", (e) => {
    const cell = e.target.closest(".cell[data-tip]");
    if (cell) tip.style.opacity = "0";
  });
})();
</script>
